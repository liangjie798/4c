<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 数据工程与 EDA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="min-h-screen text-slate-200">
  <div class="flex min-h-screen">
    <aside class="w-64 flex flex-col h-full flex-shrink-0 z-10 border-r border-cyan-500/20 bg-slate-900/60 backdrop-blur-md">
      <div class="p-6 border-b border-cyan-500/20">
        <a href="../index.html" class="text-xl font-bold tech-font flex items-center gap-2 text-cyan-400 drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]">
          <span>🌍</span> 能源危机评估
        </a>
      </div>
      <nav class="flex-1 p-4 overflow-y-auto">
        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4 tech-font">分析模块</p>
        <a class="nav-link" data-nav="eda" href="/html/eda.html">📊 数据工程与 EDA</a>
        <a class="nav-link" data-nav="beta" href="/html/beta.html">📈 传导率 Beta 榜单</a>
        <a class="nav-link" data-nav="irf" href="/html/irf.html">⚡ 动态抗击打 IRF</a>
        <a class="nav-link" data-nav="topsis" href="/html/topsis.html">🏆 极限压力 TOPSIS</a>
      </nav>
      <div class="p-4 border-t border-cyan-500/20 text-xs text-slate-500 text-center tech-font">
        基于 FastAPI + HTML/JS
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8 relative">
      <div id="loader" class="absolute inset-0 z-50 flex items-center justify-center hidden rounded-xl">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2"></div>
      </div>

      <h2 class="text-2xl font-bold mb-2 tech-font text-cyan-400">📊 数据工程与探索性分析 (EDA)</h2>
      <p class="text-slate-400 mb-6">通过双Y轴展示国际原油价格与各国国内汽油价格的历史走势对比，并分析相关性。</p>

      <div class="card mb-6">
        <h3 class="text-lg font-semibold mb-4 tech-font text-slate-200">🔍 自定义对比国家/地区</h3>
        <div class="flex flex-col sm:flex-row gap-3 mb-4">
          <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="text-cyan-500">🔎</span>
              </div>
              <input type="text" id="countrySearch" oninput="filterCountries()" placeholder="输入国家/地区名称搜索..." class="input" style="padding-left: 2.5rem;">
            </div>
          <div class="flex gap-2 shrink-0">
            <button onclick="selectAllCountries(true)" class="btn btn-secondary">全选当前</button>
            <button onclick="selectAllCountries(false)" class="btn btn-secondary">清空当前</button>
            <button onclick="applyCountrySelection()" class="btn btn-primary">应用并刷新</button>
          </div>
        </div>
        <div id="countryCheckboxes" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2 max-h-32 overflow-y-auto p-3 border border-cyan-500/20 rounded bg-slate-800/50">
          <div class="text-sm text-slate-400">正在加载国家列表...</div>
        </div>
      </div>

      <div class="card mb-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg font-semibold tech-font text-slate-200">国际原油价格 vs 国内汽油价格走势</h3>
        </div>
        <div id="edaLineChart" style="height: 520px; width: 100%;"></div>
      </div>

      <div class="card">
        <h3 class="text-lg font-semibold mb-4 tech-font text-slate-200">Pearson 相关系数热力图</h3>
        <div id="edaHeatmapChart" style="height: 520px; width: 100%;"></div>
      </div>
    </main>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/eda.js"></script>
</body>
</html>
